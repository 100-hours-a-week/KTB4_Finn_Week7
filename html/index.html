<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판</title>
  <link rel="stylesheet" href="../css/index.css" />
</head>
<body>
  <header class="header">
    <h1>
      <a href="./index.html">아무 말 대잔치</a>
    </h1>

    <div class="profile-menu">
      <img
        id="header-profile-img"
        class="profile-img"
        src="https://png.pngtree.com/thumb_back/fh260/background/20230527/pngtree-brown-and-white-dog-running-near-grass-image_2681708.jpg"
        alt="프로필 이미지"
      />
    </div>
  </header>

  <main class="main">
    <section class="board-container">
      <h2>
        안녕하세요,<br />
        아무 말 대잔치 <strong>게시판</strong> 입니다.
      </h2>

      <div class="write-button-wrap">
        <a class="write-button" href="./post-create.html">게시글 작성</a>
      </div>

      <article class="post-card">
        <div class="post-content">
          <h3>제목 1</h3>
          <div class="post-info">
            <span>좋아요 0</span>
            <span>댓글 0</span>
            <span>조회수 0</span>
            <time>2021-01-01 00:00:00</time>
          </div>
        </div>

        <div class="post-author">
          <div class="author-img">
          </div>
          <strong>더미 작성자 1</strong>
        </div>
      </article>
    </section>
  </main>
</body>
</html>

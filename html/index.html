<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판</title>
  <link rel="stylesheet" href="../css/index.css" />
  <script type="module" src="../js/page/index.js"></script>
  <script type="module" src="../js/page/header.js"></script>
</head> 
<body>
  <header class="header">
    <h1>
      <a href="./index.html">아무 말 대잔치</a>
    </h1>

    <div class="profile-menu">
      <button id="profile-menu-button" class="profile-menu-button" type="button" aria-label="프로필 메뉴 열기">
        <img
          id="header-profile-img"
          class="profile-img"
          src="https://png.pngtree.com/thumb_back/fh260/background/20230527/pngtree-brown-and-white-dog-running-near-grass-image_2681708.jpg"
          alt="프로필 이미지"
        />
      </button>

      <nav id="profile-dropdown" class="profile-dropdown" aria-label="프로필 메뉴" hidden>
        <a href="./user-detail.html">회원정보수정</a>
        <a href="./password-edit.html">비밀번호수정</a>
        <button id="logout-button" type="button">로그아웃</button>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="board-container">
      <h2>
        안녕하세요,<br />
        아무 말 대잔치 <strong>게시판</strong> 입니다.
      </h2>

      <div class="write-button-wrap">
        <a class="write-button" href="./post-create.html">게시글 작성</a>
      </div>

      <div id="post-list-container"></div>
    </section>
  </main>

  <template id="post-card-template">
    <article class="post-card">
      <a class="post-link" href="">
        <div class="post-content">
          <h3 class="post-title"></h3>
          <div class="post-info">
            <span class="post-like-count"></span>
            <span class="post-comment-count"></span>
            <span class="post-view-count"></span>
            <time class="post-created-at"></time>
          </div>
        </div>

        <div class="post-author">
          <div class="author-img">
            <img class="post-author-img" src="" alt="Author Image" />
          </div>
          <strong class="post-author-nickname"></strong>
        </div>
      </a>
    </article>
  </template>
</body>
</html>

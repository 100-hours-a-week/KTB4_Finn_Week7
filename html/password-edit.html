<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 수정</title>

  <link rel="stylesheet" href="../css/password-edit.css" />

  <script type="module" src="../js/page/header.js"></script>
  <script type="module" src="../js/page/password-edit.js"></script>
</head>
<body>
  <header class="header">
    <h1>
      <a href="./index.html">아무 말 대잔치</a>
    </h1>

    <div class="profile-menu">
      <button id="profile-menu-button" class="profile-menu-button" type="button" aria-label="프로필 메뉴 열기">
        <img
          id="header-profile-img"
          class="profile-img"
          src="../assets/image.png"
          alt="프로필 이미지"
        />
      </button>

      <nav id="profile-dropdown" class="profile-dropdown" aria-label="프로필 메뉴" hidden>
        <a href="./user-detail.html">회원정보수정</a>
        <a href="./password-edit.html">비밀번호수정</a>
        <button id="logout-button" type="button">로그아웃</button>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="password-edit-container">
      <h2>비밀번호 수정</h2>

      <form id="password-edit-form" novalidate>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input
            id="password"
            type="password"
            placeholder="비밀번호를 입력하세요"
          />
          <p id="password-error" class="helper-text"></p>
        </div>

        <div class="form-group">
          <label for="password-confirm">비밀번호 확인</label>
          <input
            id="password-confirm"
            type="password"
            placeholder="비밀번호를 한번 더 입력하세요"
          />
          <p id="password-confirm-error" class="helper-text"></p>
        </div>

        <button id="password-submit-button" class="password-submit-button" type="button">
          수정하기
        </button>
      </form>

      <div id="password-success-toast" class="toast-message" role="status" hidden>
        <p id="password-message"></p>
      </div>
    </section>
  </main>
</body>
</html>

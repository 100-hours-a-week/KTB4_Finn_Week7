삭제 모달 추가 필요
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 상세</title>

  <link rel="stylesheet" href="../css/post-detail.css" />

  <script type="module" src="../js/page/post-detail.js"></script>
  <script type="module" src="../js/page/comment.js"></script>
  <script type="module" src="../js/page/header.js"></script>
</head>
<body>
  <header class="header">
    <a class="back-button" href="./index.html" aria-label="이전 페이지">&lt;</a>
    <h1>
      <a href="./index.html">아무 말 대잔치</a>
    </h1>

    <div class="profile-menu">
      <button id="profile-menu-button" class="profile-menu-button" type="button" aria-label="프로필 메뉴 열기">
        <img
          id="header-profile-img"
          class="profile-img"
          src="../assets/image.png"
          alt="프로필 이미지"
        />
      </button>

      <nav id="profile-dropdown" class="profile-dropdown" aria-label="프로필 메뉴" hidden>
        <a href="./user-detail.html">회원정보수정</a>
        <a href="./password-edit.html">비밀번호수정</a>
        <button id="logout-button" type="button">로그아웃</button>
      </nav>
    </div>
  </header>

  <main class="main">
    <article class="post-detail">
      <section class="post-header">
        <h2 id="post-title">제목입니다</h2>

        <div class="post-meta-row">
          <div class="author-info">
            <img id="post-author-img" class="author-img" src="../assets/image.png" alt="작성자 프로필" />
            <strong id="post-author">작성자 이름</strong>
            <time id="post-created-at">2026-07-28</time>
          </div>

          <div class="post-actions">
            <button id="post-edit-button" type="button">수정</button>
            <button id="post-delete-button" type="button">삭제</button>
          </div>
        </div>
      </section>

      <section class="post-body">
        <img id="post-image" class="post-image" src="" alt="게시글 이미지" hidden />
        <p id="post-content">게시물 본문입니다</p>
      </section>

      <section class="post-stats">
        <button id="post-like-button" class="like-count-button" type="button">
          <strong id="like-count">0</strong>
          <span>좋아요수</span>
        </button>
        <div>
          <strong id="view-count">0</strong>
          <span>조회수</span>
        </div>
        <div>
          <strong id="comment-count">0</strong>
          <span>댓글</span>
        </div>
      </section>
    </article>

    <section class="comment-write-box">
      <textarea id="comment-input" placeholder="댓글을 남겨주세요!"></textarea>

      <div class="comment-submit-row">
        <button id="comment-submit-button" type="button">댓글 등록</button>
      </div>
    </section>

    <div id="comment-list-container">

    </div>
  </main>

  <template id="comment-template">
  <article class="comment-item">
    <div class="comment-top">
      <img class="author-img comment-author-img" src="../assets/image.png" alt="댓글 작성자 프로필" />
      <strong class="comment-author"></strong>
      <time class="comment-created-at"></time>

      <div class="comment-actions">
        <button type="button" class="comment-edit-button">수정</button>
        <button type="button" class="comment-delete-button">삭제</button>
      </div>
    </div>

    <p class="comment-content"></p>

    <div class="comment-edit-box" hidden>
      <textarea class="comment-edit-input"></textarea>

      <div class="comment-edit-submit-row">
        <button type="button" class="comment-edit-cancel-button">취소</button>
        <button type="button" class="comment-edit-submit-button">댓글 수정</button>
      </div>
    </div>
  </article>
  </template>

  <div id="comment-delete-modal" class="modal-overlay" hidden>
    <div class="delete-modal">
      <h2>댓글을 삭제하시겠습니까?</h2>
      <p>삭제한 내용은 복구 할 수 없습니다.</p>

      <div class="delete-modal-actions">
        <button id="comment-delete-cancel-button" class="delete-modal-cancel-button" type="button">취소</button>
        <button id="comment-delete-confirm-button" class="delete-modal-confirm-button" type="button">확인</button>
      </div>
    </div>
  </div>

  <div id="post-delete-modal" class="modal-overlay" hidden>
    <div class="delete-modal">
      <h2>게시글을 삭제하시겠습니까?</h2>
      <p>삭제한 내용은 복구 할 수 없습니다.</p>

      <div class="delete-modal-actions">
        <button id="post-delete-cancel-button" class="delete-modal-cancel-button" type="button">취소</button>
        <button id="post-delete-confirm-button" class="delete-modal-confirm-button" type="button">확인</button>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 작성</title>
  <link rel="stylesheet" href="../css/post-form.css" />

  <script type="module" src="../js/page/post-form.js"></script>
  <script type="module" src="../js/page/header.js"></script>
</head>
<body>
  <header class="header">
    <a class="back-button" href="./post-detail.html" aria-label="이전 페이지">&lt;</a>
    <h1>
      <a href="./index.html">아무 말 대잔치</a>
    </h1>

    <div class="profile-menu">
      <button id="profile-menu-button" class="profile-menu-button" type="button" aria-label="프로필 메뉴 열기">
        <img
          id="header-profile-img"
          class="profile-img"
          src="https://png.pngtree.com/thumb_back/fh260/background/20230527/pngtree-brown-and-white-dog-running-near-grass-image_2681708.jpg"
          alt="프로필 이미지"
        />
      </button>

      <nav id="profile-dropdown" class="profile-dropdown" aria-label="프로필 메뉴" hidden>
        <a href="./user-detail.html">회원정보수정</a>
        <a href="./password-edit.html">비밀번호수정</a>
        <button id="logout-button" type="button">로그아웃</button>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="post-form-container">
      <h2>게시글 수정</h2>

      <form id="post-form" novalidate>
        <div class="form-group">
          <label for="post-title">제목*</label>
          <input
            id="post-title"
            type="text"
            placeholder="제목을 입력해주세요. (최대 26글자)"
            maxlength="26"
          />
          <p id="title-error" class="helper-text"></p>
        </div>

        <div class="form-group">
          <label for="post-content">내용*</label>
          <textarea
            id="post-content"
            placeholder="내용을 입력해주세요."
          ></textarea>
          <p id="content-error" class="helper-text"></p>
        </div>

        <div class="form-group image-group">
          <label for="post-image">이미지</label>
          <input id="post-image" type="file" accept="image/*" />
        </div>

        <button id="submit-button" class="submit-button" type = "button" >
          완료
        </button>
      </form>
    </section>
  </main>
</body>
</html>

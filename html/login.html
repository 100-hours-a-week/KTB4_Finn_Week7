<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="stylesheet" href="../css/login.css" />
  <script type="module" src="../js/page/login.js"></script>
</head>
<body>
  <header class="header">
    <h1>
      <a href="./index.html">아무 말 대잔치</a>
    </h1>
  </header>

  <main class="main">
    <section class="login-container">
      <h2>로그인</h2>

      <form class="login-form">
        <div class="form-group">
          <label for="email">이메일</label>
          <input
            type="email"
            id="email"
            placeholder="이메일을 입력하세요"
          />
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            placeholder="비밀번호를 입력하세요"
            aria-describedby="login-error"
          />
          <p id="login-error" class="helper-text" role="alert" aria-live="polite"></p>
        </div>

        <button id="loginButton" type="button" class="login-button">로그인</button>
      </form>

      <a href="./signup.html" class="signup-link">회원가입</a>
    </section>
  </main>
</body>
</html>

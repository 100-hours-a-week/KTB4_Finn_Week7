<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FOCAL</title>
    <link rel="stylesheet" href="../css/index.css" />
    <script type="module" src="../js/page/index.js"></script>
    <script type="module" src="../js/page/header.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">FOCAL</a>
      <span class="brand-sub">사진과 영상을 기록하는 사람들의 피드</span>
      <a class="button header-write-button" href="post-create.html">+ 업로드</a>
      <div class="profile-menu">
        <button
          id="profile-menu-button"
          class="profile-menu-button"
          type="button"
          aria-label="프로필 메뉴 열기"
        >
          <img
            id="header-profile-img"
            class="profile-img"
            src="../../assets/image.png"
            alt="프로필 이미지"
          />
        </button>
        <nav
          id="profile-dropdown"
          class="profile-dropdown"
          aria-label="프로필 메뉴"
          hidden
        >
          <a href="user-detail.html">회원정보 수정</a>
          <a href="password-edit.html">비밀번호 수정</a>
          <button id="logout-button" type="button">로그아웃</button>
        </nav>
      </div>
    </header>

    <main class="page">
      <aside class="sidebar">
        <p class="nav-title">피드</p>
        <a class="nav-item active" data-filter="RECENT" href="?filter=RECENT">최근 피드</a>
        <a class="nav-item" data-filter="POPULAR" href="?filter=POPULAR">인기 기록</a>
        <a class="nav-item" data-filter="MINE" href="?filter=MINE">내 기록</a>
        <hr />
        <p class="nav-title">내 공간</p>
        <a class="nav-item" href="user-detail.html">내 프로필</a>
      </aside>

      <section class="feed">
        <h1>오늘의 초점을 공유해주세요</h1>
        <p class="lead">당신의 시선이 머문 장면들을 모아보세요</p>
        <nav class="tabs" aria-label="피드 정렬">
          <a class="active" data-filter="RECENT" href="?filter=RECENT">전체</a>
          <a data-filter="POPULAR" href="?filter=POPULAR">인기 기록</a>
          <a data-filter="MINE" href="?filter=MINE">내 기록</a>
        </nav>

        <div id="post-list-container">
          <article class="post-card">
            <a class="post-link" href="post-detail.html">
              <div class="post-author">
                <div class="author-img">
                  <img
                    class="post-author-img"
                    src="../../assets/image.png"
                    alt="작성자 프로필 이미지"
                  />
                </div>
                <div>
                  <strong class="post-author-nickname">정지호</strong>
                  <time class="post-created-at">2시간 전</time>
                </div>
              </div>
              <div class="post-content">
                
              </div>
            </a>
          </article>
        </div>
      </section>

      <aside class="side-panel">
        <h2>인기 게시물</h2>
        <div id="rank-list" class="rank-list">

        </div>
        <div class="notice">
          <h2>인기 태그</h2>
          
        </div>
      </aside>
    </main>

    <template id="post-card-template">
      <article class="post-card">
        <a class="post-link" href="">
          <div class="post-author">
            <div class="author-img">
              <img class="post-author-img" src="" alt="작성자 프로필 이미지" />
            </div>
            <div>
              <strong class="post-author-nickname"></strong>
              <time class="post-created-at"></time>
            </div>
          </div>
          <div class="post-content">
            <h3 class="post-title">제목</h3>
            <img
              class="post-content-img"
              src="../../assets/post_img.png"
              alt="기록 이미지"
            />
            <p class="post-summary">
              본문요약
            </p>
            <div class="post-info">
              <span class="post-like-count">♡ 128</span>
              <span class="post-comment-count">댓글 24</span>
              <span class="post-view-count">↗ 126</span>
            </div>
          </div>
        </a>
      </article>
    </template>

    <template id="rank-item-template">
      <a class="rank-item" href="">
        <b class="rank"></b>
        <div>
          <strong class="rank-title"></strong>
          <span class="rank-author"></span>
        </div>
      </a>
    </template>
  </body>
</html>

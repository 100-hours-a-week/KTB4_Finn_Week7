<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입</title>
    <link rel="stylesheet" href="../css/signup.css">
    <script type="module" src="../js/page/signup.js"></script>
  </head>
  <body>
    <header class="topbar"><a class="brand" href="index.html">아무 말 대잔치</a></header>
    <main class="auth">
      <form class="auth-card">
        <h1>새로운 이야기를 시작해요</h1>
        <p class="lead">프로필을 만들고 아무 말 대잔치에 참여하세요.</p>
        <label class="profile-upload" for="profile-img"><img id="profile-preview" alt="프로필 미리보기" hidden><span aria-hidden="true"></span></label>
        <label class="profile-label" for="profile-img">사진 추가</label>
        <input id="profile-img" type="file" accept="image/*" hidden>
        <p id="profile-error" class="helper-text" role="alert"></p>
        <div class="field"><label for="email">이메일</label><input id="email" type="email" placeholder="이메일을 입력하세요" autocomplete="email" required><p id="email-error" class="helper-text" role="alert"></p></div>
        <div class="field"><label for="password">비밀번호</label><input id="password" type="password" placeholder="비밀번호를 입력하세요" autocomplete="new-password" required></div>
        <div class="field"><label for="password-check">비밀번호 확인</label><input id="password-check" type="password" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password" required><p id="password-check-error" class="helper-text" role="alert"></p></div>
        <div class="field"><label for="nickname">닉네임</label><input id="nickname" type="text" placeholder="닉네임을 입력하세요" maxlength="10" required><p id="nickname-error" class="helper-text" role="alert"></p></div>
        <button id="signup-button" class="button" type="button" disabled>회원가입</button>
        <a class="auth-link" href="login.html">이미 계정이 있으신가요? 로그인</a>
      </form>
    </main>
  </body>
</html>

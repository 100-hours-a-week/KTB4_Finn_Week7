<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기록 상세</title>
    <link rel="stylesheet" href="../css/post-detail.css" />
    <script type="module" src="../js/page/post-detail.js"></script>
    <script type="module" src="../js/page/comment.js"></script>
    <script type="module" src="../js/page/header.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">FOCAL</a>
      <span class="brand-sub">사진과 영상을 기록하는 사람들의 피드</span>
      <div class="profile-menu profile-menu-end">
        <button
          id="profile-menu-button"
          class="profile-menu-button"
          type="button"
          aria-label="프로필 메뉴 열기"
        >
          <img
            id="header-profile-img"
            class="profile-img"
            src="../../assets/image.png"
            alt="프로필 이미지"
          />
        </button>
        <nav
          id="profile-dropdown"
          class="profile-dropdown"
          aria-label="프로필 메뉴"
          hidden
        >
          <a href="user-detail.html">회원정보 수정</a>
          <a href="password-edit.html">비밀번호 수정</a>
          <button id="logout-button" type="button">로그아웃</button>
        </nav>
      </div>
    </header>

    <main class="post-wrap">
      <a class="back" href="index.html" aria-label="목록으로 돌아가기">‹</a>
      <article class="post post-detail">
        <section class="post-header">
          <h1 id="post-title">오늘 있었던 작은 행복</h1>
          <div class="post-header-row post-meta-row">
            <div class="author author-info">
              <img
                id="post-author-img"
                class="avatar author-img"
                src="../../assets/image.png"
                alt="작성자 프로필"
              />
              <div class="author-copy">
                <strong id="post-author" class="author-name">정지호</strong>
                <time id="post-created-at" class="meta">2026. 07. 11 · 10:20</time>
              </div>
            </div>
            <div class="post-actions">
              <button
                id="post-edit-button"
                class="button outline small"
                type="button"
              >
                수정</button
              ><button
                id="post-delete-button"
                class="button outline small"
                type="button"
              >
                삭제
              </button>
            </div>
          </div>
        </section>
        <section class="post-body">
          <img
            id="post-image"
            class="post-media post-image"
            alt="기록 이미지"
            hidden
          />
          <p id="post-content">
            퇴근길에 우연히 본 노을이 정말 예뻤어요.<br />작은 순간이지만 기분
            좋은 하루였습니다.
          </p>
        </section>
        <section class="post-stats" aria-label="기록 통계">
          <button
            id="post-like-button"
            class="post-metric like-count-button"
            type="button"
            aria-pressed="false"
          >
            <span class="metric-icon like-icon" aria-hidden="true">♡</span>
            <span class="metric-copy">
              <strong id="like-count">128</strong>
              <span>좋아요</span>
            </span>
          </button>
          <div class="post-metric">
            <span class="metric-icon" aria-hidden="true">◉</span>
            <span class="metric-copy">
              <strong id="view-count">126</strong>
              <span>조회수</span>
            </span>
          </div>
          <div class="post-metric">
            <span class="metric-icon" aria-hidden="true">🗨</span>
            <span class="metric-copy">
              <strong id="comment-count">24</strong>
              <span>댓글</span>
            </span>
          </div>
        </section>
      </article>

      <section class="comment-form comment-write-box">
        <textarea
          id="comment-input"
          placeholder="이 장면에 대한 댓글을 남겨주세요."
          required
        ></textarea>
        <div class="comment-submit comment-submit-row">
          <button id="comment-submit-button" class="button" type="button" disabled>
            댓글 등록
          </button>
        </div>
      </section>

      <div id="comment-list-container">
        <article class="comment comment-item">
          <div class="comment-top">
            <img
              class="avatar author-img comment-author-img"
              src="../../assets/image.png"
              alt="댓글 작성자 프로필"
            />
            <div>
              <strong class="comment-author">커피좋아</strong
              ><time class="comment-created-at meta">2026. 07. 11 · 10:35</time>
            </div>
            <div class="comment-actions">
              <button
                class="button outline small comment-edit-button"
                type="button"
              >
                수정</button
              ><button
                class="button outline small comment-delete-button"
                type="button"
              >
                삭제
              </button>
            </div>
          </div>
          <p class="comment-content">
            노을 사진도 보고 싶어요. 좋은 하루 보내세요!
          </p>
          <div class="comment-edit-box" hidden>
            <textarea class="comment-edit-input"></textarea>
            <div class="comment-edit-submit-row">
              <button class="comment-edit-cancel-button" type="button">
                취소</button
              ><button class="comment-edit-submit-button" type="button">
                댓글 수정
              </button>
            </div>
          </div>
        </article>
      </div>
    </main>

    <template id="comment-template">
      <article class="comment comment-item">
        <div class="comment-top">
          <img
            class="avatar author-img comment-author-img"
            src="../../assets/image.png"
            alt="댓글 작성자 프로필"
          />
          <div>
            <strong class="comment-author"></strong
            ><time class="comment-created-at meta"></time>
          </div>
          <div class="comment-actions">
            <button
              class="button outline small comment-edit-button"
              type="button"
            >
              수정</button
            ><button
              class="button outline small comment-delete-button"
              type="button"
            >
              삭제
            </button>
          </div>
        </div>
        <p class="comment-content"></p>
        <div class="comment-edit-box" hidden>
          <textarea class="comment-edit-input"></textarea>
          <div class="comment-edit-submit-row">
            <button class="comment-edit-cancel-button" type="button">
              취소</button
            ><button class="comment-edit-submit-button" type="button">
              댓글 수정
            </button>
          </div>
        </div>
      </article>
    </template>

    <div id="comment-delete-modal" class="modal-overlay" hidden>
      <div class="delete-modal">
        <h2>댓글을 삭제하시겠습니까?</h2>
        <p>삭제한 내용은 복구할 수 없습니다.</p>
        <div class="delete-modal-actions">
          <button id="comment-delete-cancel-button" type="button">취소</button
          ><button id="comment-delete-confirm-button" type="button">
            확인
          </button>
        </div>
      </div>
    </div>
    <div id="post-delete-modal" class="modal-overlay" hidden>
      <div class="delete-modal">
        <h2>기록을 삭제하시겠습니까?</h2>
        <p>삭제한 내용은 복구할 수 없습니다.</p>
        <div class="delete-modal-actions">
          <button id="post-delete-cancel-button" type="button">취소</button
          ><button id="post-delete-confirm-button" type="button">확인</button>
        </div>
      </div>
    </div>
  </body>
</html>

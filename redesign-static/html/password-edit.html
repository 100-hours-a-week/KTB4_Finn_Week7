<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>비밀번호 수정</title>
    <link rel="stylesheet" href="../css/password-edit.css">
    <script type="module" src="../js/page/password-edit.js"></script>
    <script type="module" src="../js/page/header.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">FOCAL</a>
      <span class="brand-sub">사진과 영상을 기록하는 사람들의 피드</span>
      <div class="profile-menu profile-menu-end">
        <button id="profile-menu-button" class="profile-menu-button" type="button" aria-label="프로필 메뉴 열기"><img id="header-profile-img" class="profile-img" src="../../assets/image.png" alt="프로필 이미지"></button>
        <nav id="profile-dropdown" class="profile-dropdown" aria-label="프로필 메뉴" hidden>
          <a href="user-detail.html">회원정보 수정</a>
          <a href="password-edit.html">비밀번호 수정</a>
          <button id="logout-button" type="button">로그아웃</button>
        </nav>
      </div>
    </header>

    <main class="profile-page">
      <h1>비밀번호 수정</h1>
      <div class="field"><label for="password">새 비밀번호</label><input id="password" type="password" placeholder="비밀번호를 입력하세요" autocomplete="new-password" required><p id="password-error" class="helper-text"></p></div>
      <div class="field"><label for="password-confirm">새 비밀번호 확인</label><input id="password-confirm" type="password" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password" required><p id="password-confirm-error" class="helper-text"></p></div>
      <button id="password-submit-button" class="button wide" type="button" disabled>수정하기</button>
      <div id="password-success-toast" class="toast-message" role="status" hidden><p id="password-message"></p></div>
    </main>
  </body>
</html>

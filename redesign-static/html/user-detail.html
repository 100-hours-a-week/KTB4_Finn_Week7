<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>회원정보 수정</title>
    <link rel="stylesheet" href="../css/user-detail.css" />
    <script type="module" src="../js/page/user-edit.js"></script>
    <script type="module" src="../js/page/header.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">아무 말 대잔치</a>
      <span class="brand-sub">오늘의 생각을 가볍게 나누는 공간</span>
      <div class="profile-menu" style="margin-left: auto">
        <button
          id="profile-menu-button"
          class="profile-menu-button"
          type="button"
          aria-label="프로필 메뉴 열기"
        >
          <img
            id="header-profile-img"
            class="profile-img"
            src="../../assets/image.png"
            alt="프로필 이미지"
          />
        </button>
        <nav
          id="profile-dropdown"
          class="profile-dropdown"
          aria-label="프로필 메뉴"
          hidden
        >
          <a href="user-detail.html">회원정보 수정</a>
          <a href="password-edit.html">비밀번호 수정</a>
          <button id="logout-button" type="button">로그아웃</button>
        </nav>
      </div>
    </header>

    <main class="profile-page">
      <section class="user-edit-container">
        <h1>회원정보 수정</h1>
        <form id="user-edit-form" novalidate>
          <section class="profile-section">
            <label>프로필 사진</label>
            <label
              class="profile-photo profile-edit-image"
              for="profile-image-input"
              ><img
                id="profile-preview"
                src="../../assets/image.png"
                alt="프로필 사진"
              /><span>변경</span></label
            >
            <input
              id="profile-image-input"
              type="file"
              accept="image/*"
              hidden
            />
          </section>
          <div class="field form-group">
            <label>이메일</label>
            <p id="user-email" class="email-value email-text">
              hello@amumaltalk.com
            </p>
          </div>
          <div class="field form-group">
            <label for="nickname">닉네임</label
            ><input id="nickname" value="정지호" />
            <p id="nickname-error" class="helper-text"></p>
          </div>
          <button
            id="edit-submit-button"
            class="button wide edit-submit-button"
            type="button"
          >
            수정하기
          </button>
          <button
            id="withdraw-button"
            class="withdraw withdraw-button"
            type="button"
          >
            회원 탈퇴
          </button>
        </form>
        <div id="edit-success-toast" class="toast-message" role="status" hidden>
          <p id="edit-message"></p>
        </div>
      </section>
    </main>

    <div id="withdraw-modal" class="modal-overlay" hidden>
      <div class="withdraw-modal">
        <h2>회원탈퇴 하시겠습니까?</h2>
        <p>작성된 게시글과 댓글은 삭제됩니다.</p>
        <div class="withdraw-modal-actions">
          <button id="withdraw-cancel-button" type="button">취소</button
          ><button id="withdraw-confirm-button" type="button">확인</button>
        </div>
      </div>
    </div>
  </body>
</html>
